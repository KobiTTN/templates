<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TemplateHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f12;
  --surface: #18181f;
  --surface2: #22222d;
  --border: #2e2e3d;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --text: #e8e8f0;
  --text-muted: #7a7a99;
  --text-dim: #4a4a66;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

/* HEADER */
header { position:relative; z-index:10; padding:18px 32px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:rgba(15,15,18,0.9); backdrop-filter:blur(12px); }
.logo { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; letter-spacing:-0.5px; display:flex; align-items:center; gap:10px; }
.logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.75)} }
.header-stats { display:flex; gap:20px; font-size:12px; color:var(--text-muted); }
.header-stats span strong { color:var(--text); font-weight:500; }

/* HERO */
.hero { position:relative; z-index:1; padding:48px 32px 36px; text-align:center; }
.hero-label { display:inline-block; font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--accent); background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.2); padding:5px 14px; border-radius:20px; margin-bottom:18px; }
.hero h1 { font-family:'Syne',sans-serif; font-size:clamp(28px,4vw,48px); font-weight:800; line-height:1.05; letter-spacing:-1.5px; margin-bottom:12px; }
.hero h1 span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero p { font-size:15px; color:var(--text-muted); max-width:420px; margin:0 auto 28px; line-height:1.6; font-weight:300; }
.search-wrap { max-width:560px; margin:0 auto; position:relative; }
.search-wrap svg { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; }
#search { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px 14px 46px; font-size:15px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; transition:all 0.2s; }
#search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,0.12); }
#search::placeholder { color:var(--text-dim); }

/* LAYOUT */
.main { position:relative; z-index:1; display:grid; grid-template-columns:220px 1fr; }

/* SIDEBAR */
.sidebar { padding:28px 20px; border-right:1px solid var(--border); position:sticky; top:0; height:fit-content; }
.filter-section { margin-bottom:28px; }
.filter-title { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; }
.filter-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:8px 10px; border-radius:7px; border:none; background:transparent; color:var(--text-muted); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.15s; text-align:left; margin-bottom:2px; }
.filter-btn:hover { background:var(--surface); color:var(--text); }
.filter-btn.active { background:rgba(108,99,255,0.12); color:var(--accent); font-weight:500; }
.filter-count { font-size:11px; background:var(--surface2); padding:2px 7px; border-radius:10px; color:var(--text-dim); min-width:22px; text-align:center; flex-shrink:0; }
.filter-btn.active .filter-count { background:rgba(108,99,255,0.2); color:var(--accent); }
.lang-grid { display:flex; flex-wrap:wrap; gap:6px; }
.lang-btn { padding:5px 11px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:12px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.15s; }
.lang-btn:hover { border-color:var(--accent); color:var(--accent); }
.lang-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

/* CONTENT */
.content { padding:28px 32px; min-height:60vh; }

/* FEATURED */
.featured-section { margin-bottom:36px; }
.section-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.section-title::before { content:''; display:inline-block; width:3px; height:14px; background:linear-gradient(180deg,var(--accent),var(--accent2)); border-radius:2px; }
.featured-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
.card-featured { border-color:rgba(108,99,255,0.25); background:linear-gradient(135deg,rgba(108,99,255,0.06),rgba(255,101,132,0.03)); }
.card-featured::after { content:'★'; position:absolute; top:12px; right:12px; font-size:10px; color:var(--accent); opacity:0.6; }

/* DIVIDER */
.divider { border:none; border-top:1px solid var(--border); margin:0 0 28px; }

/* RESULTS */
.content-header { display:flex; align-items:center; margin-bottom:18px; }
.results-info { font-size:13px; color:var(--text-muted); }
.results-info strong { color:var(--text); }

/* GRID */
.templates-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }

/* CARD */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0; transition:opacity 0.2s; }
.card:hover { border-color:rgba(108,99,255,0.35); transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,0.35); }
.card:hover::before { opacity:1; }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:8px; }
.card-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; line-height:1.3; color:var(--text); }
.card-lang { font-size:10px; font-weight:600; letter-spacing:1px; padding:3px 7px; border-radius:5px; background:var(--surface2); color:var(--text-muted); flex-shrink:0; }
.card-subject { font-size:12px; color:var(--text-muted); margin-bottom:8px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-subject em { color:var(--text-dim); font-style:normal; }
.card-preview { font-size:12px; color:var(--text-muted); line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:14px; font-weight:300; }
.card-footer { display:flex; align-items:center; justify-content:space-between; }
.card-author { font-size:11px; color:var(--text-dim); }

/* CATEGORY TAGS */
.card-category { font-size:11px; padding:3px 9px; border-radius:5px; font-weight:500; }
.cat-Повернення       { background:rgba(108,99,255,0.12); color:#9d97ff; }
.cat-Зміни            { background:rgba(255,101,132,0.12); color:#ff8fa3; }
.cat-Реєстрація-на-рейс { background:rgba(52,211,153,0.12); color:#6ee7b7; }
.cat-Виписка-квитків  { background:rgba(251,191,36,0.12); color:#fcd34d; }
.cat-Багаж            { background:rgba(96,165,250,0.12); color:#93c5fd; }
.cat-Компенсації      { background:rgba(244,114,182,0.12); color:#f9a8d4; }
.cat-default          { background:rgba(148,163,184,0.12); color:#94a3b8; }

/* LOADING */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; color:var(--text-muted); font-size:14px; }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* EMPTY */
.empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--text-dim); }
.empty-icon { font-size:40px; margin-bottom:14px; }
.empty h3 { font-family:'Syne',sans-serif; color:var(--text-muted); margin-bottom:6px; font-size:16px; }
.empty p { font-size:13px; }

/* ERROR */
.error-banner { background:rgba(255,101,132,0.08); border:1px solid rgba(255,101,132,0.2); border-radius:10px; padding:14px 18px; font-size:13px; color:#ff8fa3; margin-bottom:24px; display:none; }
.error-banner.show { display:block; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(10px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:620px; max-height:88vh; overflow-y:auto; transform:translateY(16px); transition:transform 0.25s; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-header { padding:22px 26px 18px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:16px; position:sticky; top:0; background:var(--surface); z-index:1; border-radius:16px 16px 0 0; }
.modal-title { font-family:'Syne',sans-serif; font-size:19px; font-weight:700; letter-spacing:-0.5px; }
.modal-meta { display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap; }
.modal-author { font-size:12px; color:var(--text-dim); }
.modal-close { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
.modal-close:hover { color:var(--text); border-color:var(--text-muted); }
.modal-body { padding:22px 26px; }
.field-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px; }
.subject-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px 14px; font-size:14px; color:var(--text); margin-bottom:18px; font-style:italic; }
.body-box { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:16px; font-size:13px; color:var(--text-muted); line-height:1.75; white-space:pre-wrap; font-weight:300; margin-bottom:22px; max-height:260px; overflow-y:auto; }
.modal-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.btn { padding:10px 18px; border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; transition:all 0.15s; border:none; display:flex; align-items:center; gap:7px; }
.btn-primary { background:var(--accent); color:white; flex:1; justify-content:center; }
.btn-primary:hover { background:#7c74ff; }
.btn-secondary { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); }
.btn-secondary:hover { color:var(--text); border-color:var(--text-muted); }
.copy-success { display:none; align-items:center; gap:5px; color:#6ee7b7; font-size:12px; }
.copy-success.show { display:flex; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>TemplateHub</div>
  <div class="header-stats">
    <span><strong id="total-count">—</strong> шаблонів</span>
    <span id="lang-count-wrap" style="display:none"><strong id="lang-count">—</strong> мов</span>
    <span><strong id="cat-count">—</strong> категорій</span>
  </div>
</header>

<div class="hero">
  <div class="hero-label">Customer Support · Email Templates</div>
  <h1>Знайди потрібний<br><span>шаблон за секунди</span></h1>
  <p>База email-шаблонів для підтримки клієнтів. Шукай, переглядай і копіюй.</p>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Пошук по назві, темі або тексту...">
  </div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">Категорія</div>
      <div id="cat-filters">
        <button class="filter-btn active" data-cat="all">Всі <span class="filter-count" id="count-all">—</span></button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Мова</div>
      <div class="lang-grid" id="lang-filters">
        <button class="lang-btn active" data-lang="all">Всі</button>
      </div>
    </div>
  </aside>

  <main class="content">
    <div id="error-banner" class="error-banner"></div>

    <!-- Featured -->
    <div id="featured-section" class="featured-section" style="display:none">
      <div class="section-title">Популярні</div>
      <div class="featured-grid" id="featured-grid"></div>
      <hr class="divider" style="margin-top:28px;">
    </div>

    <!-- All templates -->
    <div class="content-header">
      <div class="results-info">Показано <strong id="shown-count">—</strong> шаблонів</div>
    </div>
    <div id="grid">
      <div class="loading"><div class="spinner"></div>Завантаження шаблонів...</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-meta">
          <span id="modal-category" class="card-category"></span>
          <span id="modal-lang" class="card-lang"></span>
          <span class="modal-author" id="modal-author"></span>
        </div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-label">Тема листа</div>
      <div class="subject-box" id="modal-subject"></div>
      <div class="field-label">Текст листа</div>
      <div class="body-box" id="modal-body-text"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="copy-body">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Копіювати текст
        </button>
        <button class="btn btn-secondary" id="copy-subject">Копіювати тему</button>
        <div class="copy-success" id="copy-success">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Скопійовано!
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1mbv54soItZF632tyxdNTs5OBl6aTZwK-MBvBsMKzE28';
const BASE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;

let allTemplates = [];
let categories = [];
let activeCategory = 'all';
let activeLang = 'all';
let searchQuery = '';
let currentTemplate = null;

// --- CSV PARSER ---
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVRow(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVRow(line);
    const obj = {};
    headers.forEach((h, i) => {
      obj[h.trim().replace(/^"|"$/g, '')] = (vals[i] || '').replace(/^"|"$/g, '').trim();
    });
    return obj;
  }).filter(r => r.id);
}

function parseCSVRow(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

// --- FETCH ---
async function fetchSheet(sheetName) {
  const url = BASE_URL + encodeURIComponent(sheetName);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.text();
}

async function loadData() {
  try {
    const [tmplCSV, catCSV] = await Promise.all([
      fetchSheet('templates'),
      fetchSheet('categories')
    ]);

    categories = parseCSV(catCSV).map(r => r.name).filter(Boolean);
    const raw = parseCSV(tmplCSV);
    allTemplates = raw.filter(r => r.status === 'active');

    buildSidebar();
    updateHeaderStats();
    render();
  } catch (e) {
    showError('Не вдалося завантажити шаблони. Перевір що таблиця відкрита для всіх по посиланню. (' + e.message + ')');
    document.getElementById('grid').innerHTML = '';
  }
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
}

// --- SIDEBAR ---
function buildSidebar() {
  // Categories
  const wrap = document.getElementById('cat-filters');
  const langs = [...new Set(allTemplates.map(t => t.language).filter(Boolean))].sort();

  wrap.innerHTML = `<button class="filter-btn active" data-cat="all">Всі <span class="filter-count" id="count-all">0</span></button>`;
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="filter-count">0</span>`;
    wrap.appendChild(btn);
  });

  wrap.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      wrap.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Languages
  const langWrap = document.getElementById('lang-filters');
  langWrap.innerHTML = `<button class="lang-btn active" data-lang="all">Всі</button>`;
  langs.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = lang;
    btn.textContent = lang;
    langWrap.appendChild(btn);
  });

  langWrap.querySelectorAll('[data-lang]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeLang = btn.dataset.lang;
      langWrap.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

function updateHeaderStats() {
  const langs = [...new Set(allTemplates.map(t => t.language).filter(Boolean))];
  document.getElementById('total-count').textContent = allTemplates.length;
  document.getElementById('lang-count').textContent = langs.length;
  document.getElementById('lang-count-wrap').style.display = '';
  document.getElementById('cat-count').textContent = categories.length;
}

// --- FILTER ---
function getFiltered() {
  return allTemplates.filter(t => {
    const matchCat = activeCategory === 'all' || t.category === activeCategory;
    const matchLang = activeLang === 'all' || t.language === activeLang;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      (t.name || '').toLowerCase().includes(q) ||
      (t.subject || '').toLowerCase().includes(q) ||
      (t.body || '').toLowerCase().includes(q);
    return matchCat && matchLang && matchSearch;
  });
}

// --- RENDER ---
function render() {
  const filtered = getFiltered();
  const featured = allTemplates.filter(t =>
    t.featured === 'TRUE' &&
    (activeLang === 'all' || t.language === activeLang) &&
    (activeCategory === 'all' || t.category === activeCategory)
  );

  // Update counts in sidebar
  document.getElementById('count-all').textContent =
    allTemplates.filter(t => activeLang === 'all' || t.language === activeLang).length;

  document.querySelectorAll('[data-cat]').forEach(btn => {
    if (btn.dataset.cat === 'all') return;
    const cnt = btn.querySelector('.filter-count');
    if (cnt) cnt.textContent = allTemplates.filter(t =>
      t.category === btn.dataset.cat &&
      (activeLang === 'all' || t.language === activeLang)
    ).length;
  });

  document.getElementById('shown-count').textContent = filtered.length;

  // Featured section — hide during search
  const featuredSection = document.getElementById('featured-section');
  if (featured.length > 0 && !searchQuery && activeCategory === 'all') {
    featuredSection.style.display = '';
    document.getElementById('featured-grid').innerHTML = featured.map(t => cardHTML(t, true)).join('');
    document.getElementById('featured-grid').querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });
  } else {
    featuredSection.style.display = 'none';
  }

  // Main grid
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <h3>Нічого не знайдено</h3>
      <p>Спробуйте змінити фільтри або пошуковий запит</p>
    </div>`;
    return;
  }

  grid.innerHTML = `<div class="templates-grid">${filtered.map(t => cardHTML(t, false)).join('')}</div>`;
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

function catClass(cat) {
  if (!cat) return 'cat-default';
  return 'cat-' + cat.replace(/\s+/g, '-');
}

function cardHTML(t, isFeatured) {
  return `<div class="card${isFeatured ? ' card-featured' : ''}" data-id="${t.id}">
    <div class="card-top">
      <div class="card-name">${t.name || '—'}</div>
      <span class="card-lang">${t.language || ''}</span>
    </div>
    <div class="card-subject"><em>Тема: </em>${t.subject || ''}</div>
    <div class="card-preview">${(t.body || '').replace(/\n/g,' ')}</div>
    <div class="card-footer">
      <span class="card-category ${catClass(t.category)}">${t.category || ''}</span>
      <span class="card-author">${t.author || ''}</span>
    </div>
  </div>`;
}

// --- MODAL ---
function openModal(id) {
  currentTemplate = allTemplates.find(t => t.id === id);
  if (!currentTemplate) return;
  document.getElementById('modal-title').textContent = currentTemplate.name || '';
  const catEl = document.getElementById('modal-category');
  catEl.className = `card-category ${catClass(currentTemplate.category)}`;
  catEl.textContent = currentTemplate.category || '';
  document.getElementById('modal-lang').textContent = currentTemplate.language || '';
  document.getElementById('modal-author').textContent = currentTemplate.author ? '· ' + currentTemplate.author : '';
  document.getElementById('modal-subject').textContent = currentTemplate.subject || '';
  document.getElementById('modal-body-text').textContent = currentTemplate.body || '';
  document.getElementById('copy-success').classList.remove('show');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(showCopied).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  });
}

function showCopied() {
  const el = document.getElementById('copy-success');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// --- EVENTS ---
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('copy-body').addEventListener('click', () => {
  if (currentTemplate) copyText(currentTemplate.body || '');
});
document.getElementById('copy-subject').addEventListener('click', () => {
  if (currentTemplate) copyText(currentTemplate.subject || '');
});

// --- INIT ---
loadData();
</script>
</body>
</html>
